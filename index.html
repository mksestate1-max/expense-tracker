// ── Currency keywords ──

// ── Action verbs: who did what to whom ──
// "took from" pattern: subject RECEIVED money FROM source
const VERBS_TOOK_FROM = {
  en: ["took from", "borrowed from", "received from", "got from", "collected from", "picked up from", "withdrew from", "taken from"],
  fr: ["a pris de", "a pris chez", "a emprunté de", "a emprunté à", "a reçu de", "a récupéré de", "a pris à", "pris de", "pris chez", "emprunté de", "emprunté à", "reçu de", "récupéré de"]

// "paid/gave to" pattern: subject GAVE money TO target
const VERBS_GAVE_TO = {
  en: ["paid", "gave", "sent", "transferred", "paid to", "gave to", "sent to", "transferred to", "handed", "handed to", "wired", "wired to", "paid for", "reimbursed"],
  fr: ["a payé", "a donné", "a envoyé", "a transféré", "a remboursé", "a versé", "payé", "donné", "envoyé", "transféré", "remboursé", "versé", "a donné à", "a payé à", "a envoyé à", "a remis", "remis"]

// ── Description keywords ──
const DESC_PREFIXES = {

// ── Number words ──
const NUMBER_WORDS_EN = {
  "zero": 0, "one": 1, "two": 2, "three": 3, "four": 4, "five": 5, "six": 6, "seven": 7,
  "eight": 8, "nine": 9, "ten": 10, "eleven": 11, "twelve": 12, "thirteen": 13, "fourteen": 14,
  "fifteen": 15, "sixteen": 16, "seventeen": 17, "eighteen": 18, "nineteen": 19, "twenty": 20,
  "thirty": 30, "forty": 40, "fifty": 50, "sixty": 60, "seventy": 70, "eighty": 80, "ninety": 90,
  "hundred": 100, "thousand": 1000, "million": 1000000
};
const NUMBER_WORDS_FR = {
  "zéro": 0, "un": 1, "une": 1, "deux": 2, "trois": 3, "quatre": 4, "cinq": 5, "six": 6,
  "sept": 7, "huit": 8, "neuf": 9, "dix": 10, "onze": 11, "douze": 12, "treize": 13,
  "quatorze": 14, "quinze": 15, "seize": 16, "vingt": 20, "trente": 30, "quarante": 40,
  "cinquante": 50, "soixante": 60, "cent": 100, "mille": 1000, "million": 1000000
};

// ── Levenshtein distance for fuzzy matching ──
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(
        dp[i-1][j] + 1, dp[i][j-1] + 1,
        dp[i-1][j-1] + (a[i-1] !== b[j-1] ? 1 : 0)
      );
  return dp[m][n];
}

// ── Match a person name with fuzzy matching ──
function matchPerson(input) {
  if (!input || input.length < 2) return null;
  const t = input.toLowerCase().trim().replace(/[''`]/g, "").replace(/\s+/g, " ");

  // Check "nelia travel" / "fifth third" first (multi-word names)
  for (const [name, variants] of Object.entries(NAME_VARIANTS)) {
    if (name === "Nelia Travel" || name === "Fifth Third") {
      for (const v of variants) {
        if (t === v || t.includes(v)) return name;
        if (v.length > 3 && levenshtein(t, v) <= 2) return name;
      }
    }
  }

  // Then check single names
  for (const [name, variants] of Object.entries(NAME_VARIANTS)) {
    if (name === "Nelia Travel" || name === "Fifth Third") continue;
    for (const v of variants) {
      if (t === v) return name;
      // Fuzzy: allow 1-2 char difference for names >= 4 chars
      if (v.length >= 4 && levenshtein(t, v) <= 1) return name;
      if (v.length >= 6 && levenshtein(t, v) <= 2) return name;
    }
    // Starts-with fallback
    const firstVar = variants[0];
    if (t.length >= 3 && firstVar.startsWith(t.slice(0, 3))) return name;
  }

  return null;
}

// ── Find account for two people ──
function findAccount(p1, p2) {
  return ACCOUNTS.find(a =>
    (a.p[0] === p1 && a.p[1] === p2) ||
    (a.p[0] === p2 && a.p[1] === p1)
  );
}

// ── Extract number from text (digits or words) ──
function extractAmount(text) {
  const t = text.toLowerCase().trim();

  // Try digit-based first: find all number-like tokens
  const digitMatch = t.match(/(\d[\d,.\s]*\d|\d+)/g);
  if (digitMatch) {
    for (const dm of digitMatch) {
      const clean = dm.replace(/[\s,]/g, "");
      const num = parseFloat(clean);
      if (!isNaN(num) && num > 0) return num;
    }
  }

  // Try number words (e.g., "five thousand", "cinq mille")
  const allNumWords = { ...NUMBER_WORDS_EN, ...NUMBER_WORDS_FR };
  const words = t.split(/\s+/);
  let total = 0, current = 0, foundAny = false;
  for (const w of words) {
    if (allNumWords[w] !== undefined) {
      foundAny = true;
      const val = allNumWords[w];
      if (val === 1000 || val === 1000000) {
        current = (current === 0 ? 1 : current) * val;
        total += current;
        current = 0;
      } else if (val === 100) {
        current = (current === 0 ? 1 : current) * 100;
      } else {
        current += val;
      }
    }
  }
  total += current;
  if (foundAny && total > 0) return total;

  return null;
}

// ── Extract currency from text ──
function extractCurrency(text) {
  const t = text.toLowerCase();
  for (const kw of CURRENCY_USD) { if (t.includes(kw)) return "USD"; }
  for (const kw of CURRENCY_DHS) { if (t.includes(kw)) return "DHS"; }
  return "DHS"; // default to DHS
}

// ── Extract description from text ──
function extractDescription(text) {
  const t = text.toLowerCase();
  const allPrefixes = [...DESC_PREFIXES.en, ...DESC_PREFIXES.fr].sort((a, b) => b.length - a.length);
  for (const prefix of allPrefixes) {
    const idx = t.lastIndexOf(prefix);
    if (idx >= 0) {
      const desc = text.slice(idx + prefix.length).trim();
      // Clean desc: remove currency/number noise at the start
      const cleaned = desc.replace(/^\s*(dhs|dirhams?|dollars?|usd|mad|\d[\d,.]*)\s*/gi, "").trim();
      if (cleaned.length >= 2) return titleCase(cleaned);
    }
  }
  return null;
}

// ── Find all person names in text ──
function findAllPersons(text) {
  const t = text.toLowerCase().replace(/[''`.,!?]/g, "").replace(/\s+/g, " ").trim();
  const words = t.split(" ");
  const found = [];

  // Try multi-word names first
  for (let i = 0; i < words.length; i++) {
    if (i + 1 < words.length) {
      const twoWords = words[i] + " " + words[i + 1];
      const match = matchPerson(twoWords);
      if (match && (match === "Nelia Travel" || match === "Fifth Third")) {
        found.push({ name: match, startIdx: i, endIdx: i + 1, pos: t.indexOf(twoWords) });
        i++; // skip next word
        continue;
      }
    }
    const match = matchPerson(words[i]);
    if (match) {
      found.push({ name: match, startIdx: i, endIdx: i, pos: t.indexOf(words[i]) });
    }
  }

  // Deduplicate: if we found "Nelia" and "Nelia Travel", keep "Nelia Travel"
  return found.filter((f, idx) => {
    return !found.some((other, oidx) =>
      oidx !== idx && other.name.startsWith(f.name) && other.name.length > f.name.length &&
      Math.abs(other.startIdx - f.startIdx) <= 1
    );
  });
}

// ── Detect direction: who pays whom ──
function detectDirection(text, persons) {
  if (persons.length < 2) return null;
  const t = text.toLowerCase();
  const p1 = persons[0], p2 = persons[1];

  // ── SPLIT VERB DETECTION ──
  // Handles cases like "amine took 5000 dhs from nelia" where verb and preposition are separated
  const tookVerbs_en = ["took", "borrowed", "received", "got", "collected", "picked up", "withdrew", "taken"];
  const tookVerbs_fr = ["a pris", "a emprunté", "a reçu", "a récupéré", "pris", "emprunté", "reçu", "récupéré"];
  const fromPreps = ["from", "de", "chez", "à"];
  const allTookVerbs = [...tookVerbs_en, ...tookVerbs_fr];

  // Check for "took ... from" pattern (verb and preposition may be separated by amount/currency)
  for (const verb of allTookVerbs) {
    const verbIdx = t.indexOf(verb);
    if (verbIdx === -1) continue;
    // Look for a "from" preposition AFTER the verb
    for (const prep of fromPreps) {
      const afterVerb = t.substring(verbIdx + verb.length);
      const prepIdx = afterVerb.indexOf(prep);
      if (prepIdx === -1) continue;
      const absPrepIdx = verbIdx + verb.length + prepIdx;
      // Found "took ... from" pattern! Person before verb took FROM person after prep
      // The person AFTER "from" is the SOURCE (payer), person before verb is RECEIVER
      if (p1.pos < verbIdx && p2.pos > verbIdx) {
        return { payer: p2.name, receiver: p1.name }; // p1 took from p2 → p2 pays
      }
      if (p2.pos < verbIdx && p1.pos > verbIdx) {
        return { payer: p1.name, receiver: p2.name }; // p2 took from p1 → p1 pays
      }
      return { payer: p2.name, receiver: p1.name };
    }
  }

  // Check "gave/paid" patterns: subject paid target → subject is payer
  const gaveToVerbs = [...VERBS_GAVE_TO.en, ...VERBS_GAVE_TO.fr];
  for (const verb of gaveToVerbs) {
    if (t.includes(verb)) {
      const verbIdx = t.indexOf(verb);
      if (p1.pos < verbIdx) {
        return { payer: p1.name, receiver: p2.name }; // p1 paid p2
      }
      if (p2.pos < verbIdx) {
        return { payer: p2.name, receiver: p1.name }; // p2 paid p1
      }
      return { payer: p1.name, receiver: p2.name };
    }
  }

  // Check "owes" patterns
  const owesVerbs = [...VERBS_OWES.en, ...VERBS_OWES.fr];
  for (const verb of owesVerbs) {
    if (t.includes(verb)) {
      // "Mehdi owes Amine" → Mehdi is the payer (he owes, so record Amine as paidBy)
      return { payer: p2.name, receiver: p1.name };
    }
  }

  // Check preposition-based: "from X to Y" or "de X à Y"
  const fromToEN = t.match(/from\s+\S+.*?to\s+\S+/i);
  const fromToFR = t.match(/de\s+\S+.*?(?:à|a)\s+\S+/i);
  if (fromToEN || fromToFR) {
    return { payer: p1.name, receiver: p2.name }; // first name = source
  }

  // Default: first person mentioned is the payer
  return { payer: p1.name, receiver: p2.name };
}

// ── MAIN PARSER ──
function parseVoiceCommand(text) {
  if (!text || text.length < 5) return null;

  // 1. Find people
  const persons = findAllPersons(text);
  if (persons.length < 2) return null;

  // 2. Extract amount
  const amount = extractAmount(text);
  if (!amount || amount <= 0) return null;

  // 3. Extract currency
  const currency = extractCurrency(text);

  // 4. Detect direction
  const direction = detectDirection(text, persons);
  if (!direction) return null;

  // 5. Find the right account
  const account = findAccount(direction.payer, direction.receiver);
  if (!account) return null;

  // 6. Check currency compatibility — if mismatch, try defaulting
  if (account.currency !== currency) {
    // If user didn't explicitly say a currency, use the account's currency
    const explicitUSD = CURRENCY_USD.some(k => text.toLowerCase().includes(k));
    const explicitDHS = CURRENCY_DHS.some(k => text.toLowerCase().includes(k));
    if (!explicitUSD && !explicitDHS) {
      // No explicit currency, use account default — that's fine
    } else {
      return null; // Explicit mismatch
    }
  }

  // 7. Extract description
  const desc = extractDescription(text) || "Payment";

  return {
    accountId: account.id,
    accountLabel: account.label,
    paidBy: direction.payer,
    receiver: direction.receiver,
    amount: amount.toFixed(2),
    currency: account.currency,
    desc,
    date: getToday()
  };
}

/* ═══════════════════════════════════════
   VOICE COMMAND BUTTON (FAB)
   ═══════════════════════════════════════ */
function VoiceCommandButton({ onAddTransaction, user }) {
  const [listening, setListening] = useState(false);
  const [transcript, setTranscript] = useState("");
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState("");
  const [showModal, setShowModal] = useState(false);
  const [added, setAdded] = useState(false);
  const [lang, setLang] = useState("en"); // "en" or "fr"
  const recognitionRef = useRef(null);

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const supported = !!SpeechRecognition;

  const startListening = (forceLang) => {
    if (!supported) {
      setError("Voice recognition not supported in this browser. Try Chrome.");
      setShowModal(true);
      return;
    }
    setTranscript("");
    setParsed(null);
    setError("");
    setAdded(false);
    setShowModal(true);

    const currentLang = forceLang || lang;
    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = currentLang === "fr" ? "fr-FR" : "en-US";
    recognition.maxAlternatives = 5;

    recognition.onstart = () => setListening(true);

    recognition.onresult = (event) => {
      let interim = "";
      let final = "";
      for (let i = 0; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          final += event.results[i][0].transcript;
        } else {
          interim += event.results[i][0].transcript;
        }
      }
      setTranscript(final || interim);
      if (final) {
        const result = parseVoiceCommand(final);
        if (result) {
          setParsed(result);
          setError("");
        } else {
          setParsed(null);
          const tip = currentLang === "fr"
            ? "Pas compris. Essayez: \"Mehdi a pris de Amine 5000 DHS pour les courses\""
            : "Couldn't understand. Try: \"Mehdi took from Amine 5000 DHS for groceries\"";
          setError(tip);
        }
      }
    };

    recognition.onerror = (event) => {
      setListening(false);
      if (event.error === "no-speech") {
        setError(currentLang === "fr" ? "Aucune parole détectée. Réessayez." : "No speech detected. Try again.");
      } else if (event.error === "not-allowed") {
        setError(currentLang === "fr" ? "Accès micro refusé." : "Microphone access denied.");
      } else {
        setError("Error: " + event.error);
      }
    };

    recognition.onend = () => {
      setListening(false);
    };

    recognitionRef.current = recognition;
    recognition.start();
  };

  const stopListening = () => {
    if (recognitionRef.current) {
      recognitionRef.current.stop();
    }
  };

  const confirmAdd = () => {
    if (!parsed) return;
    onAddTransaction(parsed.accountId, {
      amount: parsed.amount,
      paidBy: parsed.paidBy,
      desc: parsed.desc,
      date: parsed.date,
      addedBy: (user.displayName || user.email) + " (voice)",
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setAdded(true);
    setTimeout(() => {
      setShowModal(false);
      setAdded(false);
      setParsed(null);
      setTranscript("");
    }, 1800);
  };

  const closeModal = () => {
    stopListening();
    setShowModal(false);
    setParsed(null);
    setTranscript("");
    setError("");
    setAdded(false);
  };

  // FAB button styles
  const fabStyle = {
    position: "fixed", bottom: 24, right: 24, zIndex: 900,
    width: 60, height: 60, borderRadius: "50%",
    background: "linear-gradient(135deg, #4F46E5, #7C3AED)",
    color: "white", border: "none", cursor: "pointer",
    display: "flex", alignItems: "center", justifyContent: "center",
    boxShadow: "0 4px 20px rgba(79,70,229,0.4)",
    fontSize: 26, transition: "transform 0.2s"
  };

  const modalOverlay = {
    position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
    background: "rgba(0,0,0,0.6)", zIndex: 2000,
    display: "flex", alignItems: "center", justifyContent: "center", padding: 16
  };

  const modalBox = {
    background: "white", borderRadius: 20, padding: "32px 28px",
    width: 440, maxWidth: "95vw", boxShadow: "0 25px 60px rgba(0,0,0,0.3)",
    textAlign: "center", position: "relative"
  };

  const langToggleStyle = (active) => ({
    padding: "6px 16px", borderRadius: 20, border: "none", cursor: "pointer",
    fontWeight: 700, fontSize: 13, transition: "all 0.2s",
    background: active ? "#4F46E5" : "#F1F5F9",
    color: active ? "white" : "#64748B"
  });

  return (
    <>
      {/* FAB */}
      <button onClick={() => startListening()} style={fabStyle} title="Voice command">
        {"\uD83C\uDF99\uFE0F"}
      </button>

      {/* Modal */}
      {showModal && (
        <div style={modalOverlay} onClick={(e) => { if (e.target === e.currentTarget) closeModal(); }}>
          <div style={modalBox} className="fade-in">
            {/* Close */}
            <button onClick={closeModal} style={{ position: "absolute", top: 12, right: 16, background: "none", border: "none", fontSize: 20, color: "#94A3B8", cursor: "pointer" }}>{"\u2715"}</button>

            {/* Language toggle */}
            <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 16 }}>
              <button onClick={() => { setLang("en"); }} style={langToggleStyle(lang === "en")}>{"\uD83C\uDDEC\uD83C\uDDE7"} English</button>
              <button onClick={() => { setLang("fr"); }} style={langToggleStyle(lang === "fr")}>{"\uD83C\uDDEB\uD83C\uDDF7"} Fran\u00E7ais</button>
            </div>

            <div style={{ fontSize: 36, marginBottom: 12 }}>{listening ? "\uD83C\uDF99\uFE0F" : added ? "\u2705" : "\uD83C\uDFA4"}</div>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: "#1E293B", marginBottom: 4 }}>
              {added
                ? (lang === "fr" ? "Transaction ajout\u00E9e !" : "Transaction Added!")
                : listening
                ? (lang === "fr" ? "\u00C9coute en cours..." : "Listening...")
                : parsed
                ? (lang === "fr" ? "Confirmer la transaction" : "Confirm Transaction")
                : (lang === "fr" ? "Commande vocale" : "Voice Command")
              }
            </h2>
            <p style={{ fontSize: 13, color: "#94A3B8", marginBottom: 20 }}>
              {added
                ? (lang === "fr" ? "Enregistr\u00E9 avec succ\u00E8s" : "Successfully saved")
                : listening
                ? (lang === "fr" ? "Parlez maintenant..." : "Speak now...")
                : !transcript && !error
                ? (lang === "fr" ? "Appuyez sur le micro pour parler" : "Tap the mic to start speaking")
                : ""
              }
            </p>

            {/* Mic animation */}
            {listening && (
              <div style={{ marginBottom: 20 }}>
                <div style={{
                  width: 80, height: 80, borderRadius: "50%", background: "#EF4444", margin: "0 auto",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  animation: "pulse 1.5s ease-in-out infinite", cursor: "pointer",
                  boxShadow: "0 0 0 0 rgba(239,68,68,0.4)"
                }} onClick={stopListening}>
                  <span style={{ fontSize: 32 }}>{"\uD83C\uDF99\uFE0F"}</span>
                </div>
                <div style={{ marginTop: 8, fontSize: 12, color: "#EF4444", fontWeight: 600 }}>
                  {lang === "fr" ? "Appuyez pour arr\u00EAter" : "Tap to stop"}
                </div>
              </div>
            )}

            {/* Transcript display */}
            {transcript && (
              <div style={{
                background: "#F8FAFC", borderRadius: 12, padding: "14px 18px", marginBottom: 16,
                border: "1px solid #E2E8F0", textAlign: "left"
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#64748B", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>
                  {lang === "fr" ? "Vous avez dit :" : "You said:"}
                </div>
                <div style={{ fontSize: 15, color: "#1E293B", fontWeight: 500, fontStyle: "italic" }}>"{transcript}"</div>
              </div>
            )}

            {/* Error */}
            {error && (
              <div style={{ background: "#FEF2F2", color: "#DC2626", padding: "12px 16px", borderRadius: 10, fontSize: 13, marginBottom: 16, textAlign: "left" }}>
                {error}
              </div>
            )}

            {/* Parsed result preview */}
            {parsed && !added && (
              <div style={{
                background: "#EEF2FF", borderRadius: 12, padding: "16px 18px", marginBottom: 16,
                border: "1px solid #C7D2FE", textAlign: "left"
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#4F46E5", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>
                  {lang === "fr" ? "Transaction d\u00E9tect\u00E9e" : "Parsed Transaction"}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <div><span style={{ fontSize: 11, color: "#64748B" }}>{lang === "fr" ? "Compte :" : "Account:"}</span><br/><strong style={{ fontSize: 14 }}>{parsed.accountLabel}</strong></div>
                  <div><span style={{ fontSize: 11, color: "#64748B" }}>{lang === "fr" ? "Montant :" : "Amount:"}</span><br/><strong style={{ fontSize: 14, color: "#4F46E5" }}>{parsed.amount} {parsed.currency}</strong></div>
                  <div><span style={{ fontSize: 11, color: "#64748B" }}>{lang === "fr" ? "Pay\u00E9 par :" : "Paid By:"}</span><br/><strong style={{ fontSize: 14 }}>{parsed.paidBy}</strong></div>
                  <div><span style={{ fontSize: 11, color: "#64748B" }}>Description :</span><br/><strong style={{ fontSize: 14 }}>{parsed.desc}</strong></div>
                </div>
              </div>
            )}

            {/* Actions */}
            {!listening && !added && (
              <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
                {parsed ? (
                  <>
                    <button onClick={() => startListening()} style={{ ...S.btnS, padding: "10px 20px" }}>{"\uD83C\uDFA4"} {lang === "fr" ? "R\u00E9essayer" : "Retry"}</button>
                    <button onClick={confirmAdd} style={{ ...S.btnP, padding: "10px 28px", background: "#10B981" }}>{"\u2713"} {lang === "fr" ? "Confirmer" : "Confirm & Add"}</button>
                  </>
                ) : (

                    {"\uD83C\uDFA4"} {transcript ? (lang === "fr" ? "R\u00E9essayer" : "Try Again") : (lang === "fr" ? "Commencer" : "Start Listening")}
                  </button>
                )}
              </div>
            )}

            {/* Examples — bilingual */}
            {!transcript && !listening && !added && (
              <div style={{ marginTop: 20, textAlign: "left" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>
                  {lang === "fr" ? "Exemples :" : "Examples:"}
                </div>
                {lang === "fr" ? (
                  <div style={{ fontSize: 12, color: "#64748B", lineHeight: 1.8 }}>

function Dashboard({ data, onNav }) {
  const summaries = ACCOUNTS.map((a) => {
    const txns = data[a.id] || [];
    let bal = 0;
    txns.forEach((t) => { bal += t.paidBy === a.p[0] ? parseFloat(t.amount) : -parseFloat(t.amount); });
    return { ...a, bal, count: txns.length };
  });
  const totalDHS = summaries.filter((s) => s.currency === "DHS").reduce((sum, s) => sum + Math.abs(s.bal), 0);
  const totalUSD = summaries.filter((s) => s.currency === "USD").reduce((sum, s) => sum + Math.abs(s.bal), 0);
  const totalTxns = summaries.reduce((s, a) => s + a.count, 0);

  return (
    <div className="fade-in">
      <div className="dashboard-stats" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginBottom: 28 }}>
        <div style={{ ...S.card, padding: "20px 24px" }}>

          <div style={{ fontSize: 28, fontWeight: 800, color: "#0F172A", marginTop: 4 }}>{totalTxns}</div>
        </div>
      </div>
      <h2 style={{ fontSize: 16, fontWeight: 700, marginBottom: 14, color: "#334155" }}>All Accounts</h2>
      <div className="dashboard-accounts" style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 14 }}>
        {summaries.map((a) => {
          const settled = Math.abs(a.bal) < 0.01;
          const owes = a.bal > 0 ? a.p[1] : a.p[0];
          const owed = a.bal > 0 ? a.p[0] : a.p[1];
          return (
            <div key={a.id} onClick={() => onNav(a.id)} style={{ ...S.card, padding: "20px 24px", cursor: "pointer", transition: "box-shadow 0.15s" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontSize: 22, marginBottom: 6 }}>{a.icon}</div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#1E293B" }}>{a.label}</div>
                  <div style={{ fontSize: 12, color: "#94A3B8", marginTop: 2 }}>{a.count} transaction{a.count !== 1 ? "s" : ""}</div>
                </div>
                <span style={{ ...S.navBadge(a.currency), fontSize: 11 }}>{a.currency}</span>
              </div>
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid #F1F5F9" }}>
                {settled
                  ? <span style={{ color: "#10B981", fontWeight: 600, fontSize: 14 }}>{"\u2713"} Settled</span>
                  : <div>
                      <div style={{ fontSize: 20, fontWeight: 800, color: "#1E293B" }}>{money(a.bal, a.currency)}</div>
                      <div style={{ fontSize: 12, color: "#64748B", marginTop: 2 }}>{owes} owes {owed}</div>
                    </div>
                }
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AccountView({ account, transactions, onAdd, onDelete, user }) {
  const [showForm, setShowForm] = useState(false);
  const [showConvert, setShowConvert] = useState(false);
  const [form, setForm] = useState({ amount: "", paidBy: account.p[0], desc: "", date: getToday() });
  const [conv, setConv] = useState({ usd: "", rate: "" });
  const [sortDir, setSortDir] = useState("desc");

  const balance = useMemo(() => {
    let b = 0;
    transactions.forEach((t) => { b += t.paidBy === account.p[0] ? parseFloat(t.amount) : -parseFloat(t.amount); });
    return b;
  }, [transactions, account.p]);

  const sorted = useMemo(() => {
    const copy = [...transactions];
    copy.sort((a, b) => sortDir === "desc" ? b.date.localeCompare(a.date) || (b.createdAt || 0) - (a.createdAt || 0) : a.date.localeCompare(b.date) || (a.createdAt || 0) - (b.createdAt || 0));
    return copy;
  }, [transactions, sortDir]);

  const withRunning = useMemo(() => {
    const chrono = [...transactions].sort((a, b) => a.date.localeCompare(b.date) || (a.createdAt || 0) - (b.createdAt || 0));
    const map = {};
    let running = 0;
    chrono.forEach((t) => {
      running += t.paidBy === account.p[0] ? parseFloat(t.amount) : -parseFloat(t.amount);
      map[t.docId || t.id] = running;
    });
    return map;
  }, [transactions, account.p]);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.amount || parseFloat(form.amount) <= 0) return;
    onAdd(account.id, {
      amount: parseFloat(form.amount).toFixed(2),
      paidBy: form.paidBy,
      desc: form.desc || "Payment",
      date: form.date,
      addedBy: user.displayName || user.email,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setForm({ amount: "", paidBy: account.p[0], desc: "", date: getToday() });
    setShowForm(false);
  };

  const handleConvertApply = () => {
    const result = (parseFloat(conv.usd) * parseFloat(conv.rate)).toFixed(2);
    setForm((f) => ({ ...f, amount: result }));
    setShowConvert(false);
    setConv({ usd: "", rate: "" });
    if (!showForm) setShowForm(true);
  };

  const settled = Math.abs(balance) < 0.01;
  const owes = balance > 0 ? account.p[1] : account.p[0];
  const owed = balance > 0 ? account.p[0] : account.p[1];
  const convResult = conv.usd && conv.rate ? (parseFloat(conv.usd) * parseFloat(conv.rate)).toFixed(2) : "";

  return (
    <div className="fade-in">
      {/* Balance */}
      <div className="balance-bar" style={{ ...S.card, padding: "24px 28px", marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <div>
          <div style={{ fontSize: 12, color: "#64748B", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Current Balance</div>
          {settled
            ? <div style={{ fontSize: 28, fontWeight: 800, color: "#10B981" }}>{"\u2713"} Settled</div>
            : <div>
                <div style={{ fontSize: 28, fontWeight: 800, color: "#1E293B" }}>{money(balance, account.currency)}</div>
                <div style={{ fontSize: 14, color: "#64748B", marginTop: 2 }}>{owes} owes {owed}</div>
              </div>
          }
        </div>
        <div className="balance-actions" style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {account.currency === "DHS" && <button onClick={() => setShowConvert(!showConvert)} style={S.btnS}>{"\uD83D\uDCB1"} Convert USD</button>}
          <button onClick={() => setShowForm(!showForm)} style={S.btnP}>{showForm ? "\u2715 Cancel" : "+ New"}</button>
        </div>
      </div>

      {/* Converter */}
      {showConvert && (
        <div style={{ ...S.card, padding: "20px 28px", marginBottom: 20, background: "#FFFBEB", borderColor: "#FDE68A" }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12, color: "#92400E" }}>{"\uD83D\uDCB1"} USD {"\u2192"} DHS Converter</div>
          <div style={{ display: "flex", gap: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
            <div style={{ flex: "1 1 120px" }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#78716C", display: "block", marginBottom: 4 }}>USD Amount</label>
              <input type="number" step="0.01" value={conv.usd} onChange={(e) => setConv({ ...conv, usd: e.target.value })} placeholder="0.00" style={S.input} />
            </div>
            <div style={{ fontSize: 20, color: "#D97706", fontWeight: 700, paddingBottom: 8 }}>{"\u00D7"}</div>
            <div style={{ flex: "1 1 120px" }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#78716C", display: "block", marginBottom: 4 }}>Rate (1 USD = ? DHS)</label>
              <input type="number" step="0.0001" value={conv.rate} onChange={(e) => setConv({ ...conv, rate: e.target.value })} placeholder="10.05" style={S.input} />
            </div>
            <div style={{ fontSize: 20, color: "#D97706", fontWeight: 700, paddingBottom: 8 }}>=</div>
            <div style={{ flex: "1 1 120px" }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#78716C", display: "block", marginBottom: 4 }}>Result (DHS)</label>
              <div style={{ padding: "10px 14px", background: "white", borderRadius: 8, border: "1px solid #CBD5E1", fontSize: 16, fontWeight: 700, color: convResult ? "#4F46E5" : "#CBD5E1", minHeight: 40 }}>{convResult || "\u2014"}</div>
            </div>
            <button disabled={!convResult} onClick={handleConvertApply} style={{ ...S.btnP, background: convResult ? "#D97706" : "#CBD5E1", whiteSpace: "nowrap", cursor: convResult ? "pointer" : "default" }}>Use {"\u2193"}</button>
          </div>
        </div>
      )}

      {/* Add Form */}
      {showForm && (
        <div style={{ ...S.card, padding: "20px 28px", marginBottom: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 14, color: "#334155" }}>Add Transaction</div>
          <form onSubmit={handleSubmit}>
            <div className="form-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 2fr 1fr", gap: 12, alignItems: "flex-end" }}>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#64748B", display: "block", marginBottom: 4 }}>Amount ({account.currency})</label>
                <input type="number" step="0.01" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} placeholder="0.00" required style={S.input} />
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#64748B", display: "block", marginBottom: 4 }}>Paid By</label>
                <select value={form.paidBy} onChange={(e) => setForm({ ...form, paidBy: e.target.value })} style={S.select}>
                  {account.p.map((p) => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#64748B", display: "block", marginBottom: 4 }}>Description</label>
                <input type="text" value={form.desc} onChange={(e) => setForm({ ...form, desc: e.target.value })} placeholder="What was this for?" style={S.input} />
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#64748B", display: "block", marginBottom: 4 }}>Date</label>
                <input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} style={S.input} />
              </div>
            </div>
            <div style={{ marginTop: 14, display: "flex", justifyContent: "flex-end" }}>
              <button type="submit" style={S.btnP}>Add Transaction</button>
            </div>
          </form>
        </div>
      )}

      {/* Table */}
      <div style={S.card}>
        <div style={{ padding: "16px 28px", borderBottom: "1px solid #E2E8F0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#334155" }}>Transactions ({transactions.length})</div>
          <button onClick={() => setSortDir(sortDir === "desc" ? "asc" : "desc")} style={{ ...S.btnS, padding: "6px 14px", fontSize: 12 }}>
            {sortDir === "desc" ? "\u2193 Newest" : "\u2191 Oldest"}
          </button>
        </div>
        {transactions.length === 0
          ? <div style={{ padding: "60px 20px", textAlign: "center" }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>{"\uD83D\uDCCB"}</div>
              <div style={{ fontSize: 15, color: "#94A3B8", fontWeight: 500 }}>No transactions yet</div>
              <div style={{ fontSize: 13, color: "#CBD5E1", marginTop: 4 }}>Click "+ New" or use voice command</div>
            </div>
          : <div className="table-scroll" style={{ overflowX: "auto" }}>
              <table style={S.table}>
                <thead>
                  <tr>
                    <th style={S.th}>#</th>
                    <th style={S.th}>Date</th>
                    <th style={S.th}>Description</th>
                    <th style={S.th}>Paid By</th>
                    <th style={S.thR}>Amount</th>
                    <th style={S.thR}>Running Bal.</th>
                    <th style={S.th}>Added By</th>
                    <th style={{ ...S.th, textAlign: "center", width: 70 }}>Action</th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.map((t, i) => {
                    const key = t.docId || t.id;
                    const rb = withRunning[key] || 0;
                    const rowIdx = sortDir === "desc" ? transactions.length - i : i + 1;
                    return (
                      <tr key={key}>
                        <td style={{ ...S.td, color: "#94A3B8", fontSize: 12, fontWeight: 600 }}>{rowIdx}</td>
                        <td style={{ ...S.td, fontWeight: 500, whiteSpace: "nowrap" }}>{fmtDate(t.date)}</td>
                        <td style={{ ...S.td, maxWidth: 220 }}><div style={{ fontWeight: 600 }}>{t.desc}</div></td>
                        <td style={S.td}>
                          <span style={{
                            background: t.paidBy === account.p[0] ? "#EEF2FF" : "#FEF3C7",
                            color: t.paidBy === account.p[0] ? "#4F46E5" : "#D97706",
                            padding: "3px 10px", borderRadius: 12, fontSize: 12, fontWeight: 700
                          }}>{t.paidBy}</span>
                        </td>
                        <td style={{ ...S.tdR, fontWeight: 700, fontSize: 15, fontVariantNumeric: "tabular-nums" }}>{money(parseFloat(t.amount), account.currency)}</td>
                        <td style={{ ...S.tdR, fontVariantNumeric: "tabular-nums" }}>
                          <span style={{ fontWeight: 700, color: rb > 0 ? "#059669" : rb < 0 ? "#DC2626" : "#6B7280" }}>{rb > 0 ? "+" : ""}{money(rb, account.currency)}</span>
                          <div style={{ fontSize: 11, color: "#94A3B8" }}>{Math.abs(rb) < 0.01 ? "settled" : rb > 0 ? account.p[1] + " owes" : account.p[0] + " owes"}</div>
                        </td>
                        <td style={{ ...S.td, fontSize: 12, color: "#94A3B8" }}>
                          <div>{t.addedBy || "\u2014"}</div>
                          <div style={{ fontSize: 11 }}>{fmtTime(t.createdAt)}</div>
                        </td>
                        <td style={{ ...S.td, textAlign: "center" }}>
                          <button onClick={() => onDelete(account.id, t.docId)} style={S.btnD}>Delete</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
        }
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [page, setPage] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
  const [data, setData] = useState(() => {
    const d = {};
    ACCOUNTS.forEach((a) => { d[a.id] = []; });
    return d;
  });

  // Track screen size
  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener("resize", handleResize);
    return () => window.removeEventListener("resize", handleResize);
  }, []);

  // Navigate and close sidebar on mobile
  const navigate = useCallback((p) => {
    setPage(p);
    if (isMobile) setSidebarOpen(false);
  }, [isMobile]);

  // Listen to auth state
  useEffect(() => {
    const unsub = auth.onAuthStateChanged((u) => {
      setUser(u);
      setAuthLoading(false);
    });
    return unsub;
  }, []);

  // Listen to Firestore in real-time
  useEffect(() => {
    if (!user) return;
    const unsubs = ACCOUNTS.map((account) => {
      return db.collection("accounts").doc(account.id).collection("transactions")
        .orderBy("date", "asc")
        .onSnapshot((snapshot) => {
          const txns = snapshot.docs.map((doc) => ({ docId: doc.id, ...doc.data() }));
          setData((prev) => ({ ...prev, [account.id]: txns }));
        }, (err) => {
          console.error("Firestore error for " + account.id, err);
        });
    });
    return () => unsubs.forEach((u) => u());
  }, [user]);

  const addTransaction = useCallback((accountId, txn) => {
    db.collection("accounts").doc(accountId).collection("transactions").add(txn);
  }, []);

  const deleteTransaction = useCallback((accountId, docId) => {
    if (!docId) return;
    db.collection("accounts").doc(accountId).collection("transactions").doc(docId).delete();
  }, []);

  const handleLogout = () => { auth.signOut(); setPage("dashboard"); };

  // Loading
  if (authLoading) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#1E293B" }}>
        <div style={{ textAlign: "center", color: "white" }}>
          <div style={{ width: 40, height: 40, border: "4px solid #475569", borderTopColor: "#818CF8", borderRadius: "50%", animation: "spin 0.8s linear infinite", margin: "0 auto 16px" }}></div>
          <div style={{ fontSize: 14, color: "#94A3B8" }}>Loading...</div>
        </div>
      </div>
    );
  }

  // Not logged in
  if (!user) return <LoginScreen />;

  const currentAccount = ACCOUNTS.find((a) => a.id === page);
  const showSidebar = isMobile ? sidebarOpen : true;

  return (
    <div style={S.root}>
      {/* SIDEBAR OVERLAY (mobile only) */}
      {isMobile && sidebarOpen && (
        <div style={S.overlay} onClick={() => setSidebarOpen(false)}></div>
      )}

      {/* SIDEBAR */}
      <div style={isMobile ? S.sidebar(sidebarOpen) : S.sidebarDesktop}>
        <div style={S.sideHead}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <h1 style={S.sideTitle}>{"\uD83D\uDCB0"} Expense Tracker</h1>
            {isMobile && (
              <button onClick={() => setSidebarOpen(false)} style={{ background: "none", border: "none", color: "#94A3B8", fontSize: 22, cursor: "pointer" }}>{"\u2715"}</button>
            )}
          </div>
          <div style={S.sideSub}>Amine {"\u00B7"} Mehdi {"\u00B7"} Nelia</div>
        </div>
        <div style={S.navList}>
          <div onClick={() => navigate("dashboard")} style={S.navItem(page === "dashboard")}>
            <span style={S.navIcon}>{"\uD83D\uDCCA"}</span> Dashboard
          </div>
          <div style={{ padding: "14px 20px 6px", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: "#475569" }}>Accounts</div>
          {ACCOUNTS.map((a) => {
            const count = (data[a.id] || []).length;
            return (
              <div key={a.id} onClick={() => navigate(a.id)} style={S.navItem(page === a.id)}>
                <span style={S.navIcon}>{a.icon}</span>
                <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.label}</span>
                {count > 0 && <span style={{ fontSize: 11, color: "#64748B", marginRight: 4 }}>{count}</span>}
                <span style={S.navBadge(a.currency)}>{a.currency}</span>
              </div>
            );
          })}
        </div>
        {/* User info */}
        <div style={{ padding: "14px 20px", borderTop: "1px solid #334155" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: "50%", background: "#4F46E5", display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontWeight: 700, fontSize: 13, flexShrink: 0 }}>
              {(user.displayName || user.email || "?")[0].toUpperCase()}
            </div>
            <div style={{ flex: 1, overflow: "hidden" }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: "#F8FAFC", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.displayName || "User"}</div>
              <div style={{ fontSize: 10, color: "#64748B", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.email}</div>
            </div>
            <button onClick={handleLogout} title="Sign out" style={{ background: "none", border: "none", color: "#64748B", cursor: "pointer", fontSize: 16, padding: 4 }}>{"\u23FB"}</button>
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div style={S.main}>
        <div className="top-bar-inner" style={S.topBar}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            {isMobile && (
              <button onClick={() => setSidebarOpen(true)} style={S.hamburger}>
                {"\u2630"}
              </button>
            )}
            <div>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#1E293B" }}>
                {page === "dashboard" ? "Dashboard" : currentAccount?.label}
              </div>
              <div style={{ fontSize: 12, color: "#94A3B8", marginTop: 2 }}>
                {page === "dashboard"
                  ? "Overview of all accounts"
                  : (currentAccount?.currency === "USD" ? "\uD83C\uDDFA\uD83C\uDDF8" : "\uD83C\uDDF2\uD83C\uDDE6") + " " + currentAccount?.currency + " \u00B7 " + currentAccount?.p[0] + " & " + currentAccount?.p[1]}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#10B981" }}></div>
            <span style={{ fontSize: 12, color: "#10B981", fontWeight: 600 }}>Live</span>
            {page !== "dashboard" && <button onClick={() => navigate("dashboard")} style={{ ...S.btnS, padding: "8px 16px" }}>{"\u2190"} Back</button>}
          </div>
        </div>
        <div className="content-area" style={S.content}>
          {page === "dashboard" && <Dashboard data={data} onNav={navigate} />}
          {currentAccount && (
            <AccountView account={currentAccount} transactions={data[currentAccount.id]} onAdd={addTransaction} onDelete={deleteTransaction} user={user} />
          )}
        </div>
      </div>

      {/* VOICE COMMAND FAB */}
      <VoiceCommandButton onAddTransaction={addTransaction} user={user} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
